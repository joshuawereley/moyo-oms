name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Moyo.Oms.sln

      - name: Verify formatting
        run: dotnet format Moyo.Oms.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Moyo.Oms.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Moyo.Oms.sln --configuration Release --no-build --verbosity normal

      # Part of the same job so the existing required "build" check gates the SPA too.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/moyo-oms-ui/package-lock.json

      - name: Restore web dependencies
        run: npm ci
        working-directory: web/moyo-oms-ui

      - name: Build web
        run: npm run build
        working-directory: web/moyo-oms-ui
